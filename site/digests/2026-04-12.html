<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PaperFeed digest for 2026-04-12</title>
  <meta name="description" content="Daily digest for 2026-04-12">
  <style>
    :root {
      --bg: #f4efe3;
      --panel: rgba(255, 251, 242, 0.9);
      --ink: #20261f;
      --muted: #5e655d;
      --line: rgba(32, 38, 31, 0.12);
      --accent: #1e6a4c;
      --accent-soft: #ddeee6;
      --shadow: 0 18px 40px rgba(32, 38, 31, 0.08);
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(30, 106, 76, 0.12), transparent 32%),
        radial-gradient(circle at top right, rgba(178, 111, 56, 0.12), transparent 28%),
        linear-gradient(180deg, #fbf7ee 0%, var(--bg) 100%);
      min-height: 100vh;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .hero, .stack {
      width: min(860px, calc(100vw - 32px));
      margin: 0 auto;
    }
    .hero {
      padding: 48px 0 24px;
    }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.78rem;
      color: var(--muted);
      margin: 0 0 10px;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4.2rem);
      line-height: 0.95;
      max-width: 12ch;
    }
    .lede {
      max-width: 42rem;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }
    .stack {
      display: grid;
      gap: 18px;
      padding-bottom: 48px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .digest-list {
      display: grid;
      gap: 12px;
    }
    .digest-card {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px 18px;
      border-radius: 18px;
      background: white;
      border: 1px solid var(--line);
    }
    .paper-card h2, .panel h2 {
      margin-top: 0;
    }
    .meta {
      color: var(--muted);
      line-height: 1.5;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: minmax(0, 180px) minmax(0, 1fr);
      gap: 10px 16px;
      margin: 0;
    }
    .summary-grid dt {
      font-weight: 700;
      color: var(--ink);
    }
    .summary-grid dd {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }
    .link-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 16px 0 20px;
    }
    .link-row a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-soft);
      padding: 8px 12px;
      border-radius: 999px;
    }
    .back-link {
      font-weight: 700;
    }
    .empty-state {
      text-align: center;
      padding: 28px;
    }
    .footnote {
      color: var(--muted);
      font-size: 0.94rem;
      padding-bottom: 6px;
    }
    code {
      font-family: "SFMono-Regular", "SF Mono", Menlo, Consolas, monospace;
      background: rgba(32, 38, 31, 0.06);
      padding: 0.1rem 0.35rem;
      border-radius: 6px;
    }
    @media (max-width: 640px) {
      .hero {
        padding-top: 32px;
      }
      .panel {
        padding: 18px;
        border-radius: 20px;
      }
      .summary-grid {
        grid-template-columns: 1fr;
      }
      .digest-card {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  
        <header class="hero">
          <p class="eyebrow">PaperFeed digest</p>
          <h1>April 12, 2026</h1>
          <p class="lede">0 papers selected for the day.</p>
          <p><a class="back-link" href="../index.html">Back to index</a></p>
        </header>
        <main class="stack">
          
        <section class="panel empty-state">
          <h2>No new papers today</h2>
          <p>All retrieved candidates were already seen or filtered out. The site will update again on the next run.</p>
        </section>
        
          <section class="footnote">
            <p>Metadata and recommendation discovery are powered by Semantic Scholar.</p>
          </section>
        </main>
        
</body>
</html>
